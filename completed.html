<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Timetable Completed Tasks — review your finished tasks, restore or clear them.">
<meta name="keywords" content="completed tasks, task history, done tasks, timetable, productivity tracker">
<meta property="og:title" content="Completed — Timetable">
<meta property="og:description" content="Review all your completed tasks organized by date.">
<meta property="og:type" content="website">
<title>Completed — Timetable</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="bg-vignette"></div>

<div class="app-shell">

  <aside class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-brand">
      <div class="brand-name">Timetable</div>
      <div class="brand-tagline">Priority Planner</div>
    </div>

    <div class="nav-section-label">Pages</div>

    <a href="index.html" class="nav-link">
      <span class="nav-icon">⬡</span>
      <span>Priority</span>
      <span class="nav-badge" id="nav-badge-priority">0</span>
    </a>
    <a href="calendar.html" class="nav-link">
      <span class="nav-icon">◫</span>
      <span>Calendar</span>
      <span class="nav-badge" id="nav-badge-calendar">0</span>
    </a>
    <a href="completed.html" class="nav-link active" aria-current="page">
      <span class="nav-icon">◎</span>
      <span>Completed</span>
      <span class="nav-badge" id="nav-badge-completed">0</span>
    </a>

    <div class="nav-section-label" style="margin-top:24px">Data</div>
    <a href="#" class="nav-link" onclick="exportAll();return false;">
      <span class="nav-icon">↑</span>
      <span>Export</span>
    </a>
    <label class="nav-link" style="cursor:pointer">
      <span class="nav-icon">↓</span>
      <span>Import</span>
      <input type="file" accept=".json" style="display:none" onchange="importAll(this.files[0], ()=>location.reload())">
    </label>

    <div class="sidebar-footer">
      <div class="sidebar-time" id="liveClock">--:--</div>
      <div class="sidebar-date" id="liveDate"></div>
    </div>
  </aside>

  <main class="main" role="main">

    <div class="page-header">
      <div>
        <h1 class="page-title">Completed</h1>
        <p class="page-subtitle">Your finished tasks — restore or clear</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" class="search-input" id="searchInput" placeholder="Search completed…" autocomplete="off">
        </div>
        <button class="btn" id="clearAllBtn" onclick="clearAll()" style="color:var(--high);border-color:rgba(224,82,82,0.3)">Clear All</button>
      </div>
    </div>

    <div class="stat-row" id="statRow"></div>

    <div class="filter-bar" id="filterBar" role="group" aria-label="Filter by priority">
      <button class="filter-chip active" data-f="all"  onclick="setFilter('all',this)">All Priorities</button>
      <button class="filter-chip"        data-f="high" onclick="setFilter('high',this)">🔴 High</button>
      <button class="filter-chip"        data-f="med"  onclick="setFilter('med',this)">🟡 Medium</button>
      <button class="filter-chip"        data-f="low"  onclick="setFilter('low',this)">🟢 Low</button>
    </div>

    <div id="completedWrap"></div>

  </main>
</div>

<script src="app.js"></script>
<script>
let ST     = loadState();
let filter = 'all';
let search = '';

seedDemo();
ST = loadState();
startClock('liveClock');
document.getElementById('liveDate').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
updateNavBadges();
render();

document.getElementById('searchInput').addEventListener('input', e => {
  search = e.target.value.trim().toLowerCase();
  render();
});

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') document.getElementById('searchInput').blur();
});

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  renderStats();
  renderCompleted();
  updateNavBadges();
}

function renderStats() {
  const done  = ST.tasks.filter(t => t.done);
  const high  = done.filter(t => t.priority === 'high').length;
  const med   = done.filter(t => t.priority === 'med').length;
  const low   = done.filter(t => t.priority === 'low').length;
  const total = done.length;
  const active = ST.tasks.filter(t => !t.done).length;
  const rate  = ST.tasks.length ? Math.round(total / ST.tasks.length * 100) : 0;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-pill"><span class="stat-val">${total}</span><span class="stat-key">Completed</span></div>
    <div class="stat-pill"><span class="stat-val">${active}</span><span class="stat-key">Still Active</span></div>
    <div class="stat-pill"><span class="stat-val">${rate}%</span><span class="stat-key">Completion Rate</span></div>
    <div class="stat-pill"><span class="stat-val" style="color:var(--high)">${high}</span><span class="stat-key">High Done</span></div>
    <div class="stat-pill"><span class="stat-val" style="color:var(--med)">${med}</span><span class="stat-key">Med Done</span></div>
    <div class="stat-pill"><span class="stat-val" style="color:var(--low)">${low}</span><span class="stat-key">Low Done</span></div>
  `;
  document.getElementById('clearAllBtn').style.display = total > 0 ? '' : 'none';
}

function getFilteredDone() {
  let tasks = ST.tasks.filter(t => t.done);
  if (filter !== 'all') tasks = tasks.filter(t => t.priority === filter);
  if (search) tasks = tasks.filter(t =>
    t.name.toLowerCase().includes(search) ||
    (t.note||'').toLowerCase().includes(search)
  );
  return tasks;
}

function renderCompleted() {
  const wrap  = document.getElementById('completedWrap');
  const tasks = getFilteredDone();
  if (tasks.length === 0) {
    wrap.innerHTML = `
      <div style="text-align:center;padding:72px 24px;color:var(--text-dim)">
        <div style="font-family:var(--font-display);font-size:36px;font-style:italic;color:var(--border2);margin-bottom:12px">Nothing here yet</div>
        <div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase">Complete tasks on the Priority page to see them here</div>
      </div>`;
    return;
  }
  const groups = {};
  tasks.slice().sort((a,b) => (b.completedAt||0) - (a.completedAt||0)).forEach(t => {
    const label = t.completedAt
      ? new Date(t.completedAt).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
      : 'Unknown date';
    if (!groups[label]) groups[label] = [];
    groups[label].push(t);
  });
  wrap.innerHTML = '';
  Object.entries(groups).forEach(([date, grpTasks]) => {
    const section = document.createElement('div');
    section.className = 'completed-group';
    section.innerHTML = `<div class="group-header">${esc(date)}</div>`;
    grpTasks.forEach(task => {
      const row = document.createElement('div');
      row.className = 'completed-row';
      const subsDone  = (task.subitems||[]).filter(s=>s.done).length;
      const subsTotal = (task.subitems||[]).length;
      row.innerHTML = `
        <div class="completed-check" onclick="restoreTask('${task.id}')" title="Restore task" role="button"></div>
        <div style="flex:1;min-width:0">
          <div class="completed-name">${esc(task.name)}</div>
          ${task.note ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;font-style:italic;font-family:var(--font-display)">${esc(task.note)}</div>` : ''}
          ${subsTotal ? `<div style="font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:.08em">${subsDone}/${subsTotal} sub-tasks</div>` : ''}
        </div>
        ${task.deadline ? `<div style="font-size:10px;color:var(--text-dim);white-space:nowrap;padding:0 12px">${fmtDate(task.deadline)}</div>` : ''}
        <span class="completed-pri-pill ${task.priority}">${task.priority}</span>
        <button class="completed-restore" onclick="restoreTask('${task.id}')">Restore</button>
        <button class="completed-del-btn" onclick="deleteTask('${task.id}')">✕</button>
      `;
      section.appendChild(row);
    });
    wrap.appendChild(section);
  });
}

function restoreTask(id) {
  const t = ST.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = false;
  t.completedAt = null;
  saveState(ST);
  render();
  showToast('Task restored');
}

function deleteTask(id) {
  ST.tasks = ST.tasks.filter(t => t.id !== id);
  saveState(ST);
  render();
  showToast('Task deleted');
}

function clearAll() {
  const count = ST.tasks.filter(t => t.done).length;
  if (!count) return;
  if (!confirm(`Permanently delete all ${count} completed task${count !== 1 ? 's' : ''}?`)) return;
  ST.tasks = ST.tasks.filter(t => !t.done);
  saveState(ST);
  render();
  showToast(`${count} tasks cleared`);
}
</script>
</body>
</html>
